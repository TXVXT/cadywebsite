      background-size: cover; background-position: center 30%;
      display: flex; align-items: center; padding: 0 40px 80px 40px;
    }
    .hero-card {
      background: #FFF7E1; border-radius: 16px; padding: 36px 40px;
      width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      position: relative; z-index: 2; text-align: center;
    }
    .hero-card h1 { font-size: 26px; font-weight: 800; line-height: 1.2; color: #1A1A1A; margin-bottom: 16px; text-align: left; }
    .hero-card p { font-size: 14px; font-weight: 600; color: #1A1A1A; margin-bottom: 24px; line-height: 1.5; text-align: center; }
    .btn-give {
      display: inline-block; background: #FFC907; color: #1A1A1A;
      font-size: 16px; font-weight: 800; padding: 14px 48px; border-radius: 50px;
      text-decoration: none; border: none; cursor: pointer;
      font-family: 'Nunito Sans', sans-serif; transition: background 0.2s;
    }
    .btn-give:hover { background: #e0b000; }

    .wave-wrapper {
      position: absolute; bottom: 0; left: 0; width: 100%;
      overflow: hidden; line-height: 0; z-index: 1;
    }
    .wave-wrapper svg { display: block; width: 100%; height: 100px; }

    .email-section {
      background: #FFF7E1; display: flex; justify-content: flex-end;
      padding: 36px 40px 44px 40px;
    }
    .email-box { max-width: 340px; width: 100%; text-align: center; }
    .email-box h3 { font-size: 13px; font-weight: 800; color: #1A1A1A; margin-bottom: 2px; }
    .email-box p { font-size: 11px; color: #1A1A1A; margin-bottom: 12px; }
    .email-name-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .email-name-row input, .email-row input {
      flex: 1; padding: 9px 12px; border: 1px solid #CBCCD1; border-radius: 4px;
      font-size: 12px; font-family: 'Nunito Sans', sans-serif;
      background: #FFFFFF; color: #1A1A1A;
    }
    .email-name-row input::placeholder, .email-row input::placeholder { color: #CBCCD1; }
    .email-row { display: flex; gap: 8px; align-items: center; }
    .btn-subscribe {
      background: #FED8C1; color: #1A1A1A; border: none;
      padding: 9px 14px; border-radius: 4px; font-size: 12px; font-weight: 800;
      cursor: pointer; font-family: 'Nunito Sans', sans-serif;
      white-space: nowrap; display: flex; align-items: center; gap: 5px;
      transition: background 0.2s;
    }
    .btn-subscribe:hover { background: #f5c4a8; }
    .btn-subscribe img { width: 14px; height: 14px; object-fit: contain; }

    @media (max-width: 700px) {
      nav { padding: 10px 20px; flex-wrap: wrap; gap: 10px; }
      .nav-links { gap: 16px; flex-wrap: wrap; }
      .hero { height: auto; padding: 40px 20px 100px 20px; }
      .hero-card { width: 100%; }
      .email-section { justify-content: center; padding: 28px 20px; }
    }
  </style>
</head>
